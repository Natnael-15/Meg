<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; overflow: hidden; }
body { font-family: "Segoe UI Variable", "Segoe UI", system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; transition: background 0.3s; }

/* ── Light theme ── */
:root {
  --bg: #faf9f7; --bg-2: #ffffff; --bg-sidebar: #f0ede8; --bg-panel: #f5f3ef;
  --bg-hover: #e9e6df; --bg-active: #e2dfd8; --bg-input: #ffffff;
  --border: #e2dfd8; --border-light: #ebe8e2;
  --text: #17161a; --text-2: #6b6762; --text-3: #a09c97;
  --accent: #3b6eff; --accent-bg: #eef3ff; --accent-border: #c5d4ff;
  --green: #1a9e5c; --green-bg: #edfaf4; --green-border: #b8ecd6;
  --orange: #e07a30; --red: #d94f4f;
  --shadow: rgba(0,0,0,0.08); --shadow-lg: rgba(0,0,0,0.16);
  --code-bg: #16141f; --code-border: #2a2738; --code-text: #a8b5cc;
  --code-green: #a6da95; --code-blue: #7dc4e4; --code-orange: #f5a97f;
}
/* ── Dark theme ── */
body.dark {
  --bg: #141318; --bg-2: #1e1c26; --bg-sidebar: #0f0e13; --bg-panel: #1a1820;
  --bg-hover: #22202c; --bg-active: #2a2838; --bg-input: #1e1c26;
  --border: #2e2c3c; --border-light: #252232;
  --text: #e2e0ea; --text-2: #8c8a9e; --text-3: #55536a;
  --accent: #5a84ff; --accent-bg: #1a2040; --accent-border: #2a3860;
  --green: #2ab870; --green-bg: #102820; --green-border: #1a4830;
  --orange: #e07a30; --red: #e06060;
  --shadow: rgba(0,0,0,0.3); --shadow-lg: rgba(0,0,0,0.5);
  --code-bg: #0d0b14; --code-border: #1e1c2a; --code-text: #8090a8;
  --code-green: #7ab87a; --code-blue: #5ea4c4; --code-orange: #c58a60;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }

/* ── Keyframes ── */
@keyframes spin        { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes modalIn     { from { opacity: 0; transform: scale(0.94) translateY(16px); } to { opacity: 1; transform: scale(1) translateY(0); } }
@keyframes backdropIn  { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; } }
@keyframes stepFwd     { from { opacity: 0; transform: translateX(28px); } to { opacity: 1; transform: translateX(0); } }
@keyframes stepBack    { from { opacity: 0; transform: translateX(-28px); } to { opacity: 1; transform: translateX(0); } }
@keyframes fadeUp      { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideDown   { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulseGreen  { 0%,100% { box-shadow: 0 0 0 0 rgba(26,158,92,0.4); } 50% { box-shadow: 0 0 0 6px rgba(26,158,92,0); } }
@keyframes typingDot   { 0%,80%,100% { transform: scale(0.6); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }
@keyframes navIn       { from { opacity: 0; transform: translateY(10px) scale(0.99); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes msgIn       { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes sidebarIn   { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
@keyframes ripple      { from { transform: scale(0); opacity: 0.3; } to { transform: scale(3); opacity: 0; } }

/* Staggered feature list in onboarding */
.ob-feature { opacity: 0; animation: fadeUp 0.4s ease forwards; }
.ob-feature:nth-child(1) { animation-delay: 0.05s; }
.ob-feature:nth-child(2) { animation-delay: 0.12s; }
.ob-feature:nth-child(3) { animation-delay: 0.19s; }
.ob-feature:nth-child(4) { animation-delay: 0.26s; }

/* Smooth nav section transitions */
.nav-section { animation: navIn 0.22s cubic-bezier(0.22,1,0.36,1) both; }

/* Message animations */
.msg-enter { animation: msgIn 0.2s cubic-bezier(0.22,1,0.36,1) both; }

/* Windows title bar drag region */
.titlebar-drag { -webkit-app-region: drag; app-region: drag; }
.titlebar-nodrag { -webkit-app-region: no-drag; app-region: no-drag; }

/* Smooth interactive states */
.btn-pressable { transition: transform 0.1s cubic-bezier(0.34,1.56,0.64,1), background 0.12s ease, color 0.12s ease; }
.btn-pressable:active { transform: scale(0.93) !important; }

/* Windows close btn hover */
.win-close:hover { background: #c42b1c !important; color: #fff !important; }
.win-btn:hover { background: var(--bg-hover) !important; }

/* Voice waveform bars */
@keyframes waveBar { 0%,100%{transform:scaleY(0.3);} 50%{transform:scaleY(1);} }
.wave-bar { width:3px; border-radius:99px; background:var(--accent); transform-origin:center; animation:waveBar 0.7s ease-in-out infinite; }
.wave-bar:nth-child(1){animation-delay:0s;height:10px;}
.wave-bar:nth-child(2){animation-delay:0.1s;height:16px;}
.wave-bar:nth-child(3){animation-delay:0.2s;height:12px;}
.wave-bar:nth-child(4){animation-delay:0.08s;height:18px;}
.wave-bar:nth-child(5){animation-delay:0.15s;height:10px;}

/* Automation flow */
.auto-card { transition: border-color 0.15s, background 0.15s, transform 0.15s; }
.auto-card:hover { transform: translateY(-1px); }
</style>
</head>

══════════════════════════════════════════════════════ */
const WinTitleBar = ({dark, onTray, unreadCount, lmStatus}) => {
  const [maximized, setMaximized] = useState(false);
  const api = window.electronAPI;

  const handleWinBtn = key => {
    if (key === 'min')   { api?.minimize(); }
    if (key === 'max')   { setMaximized(m => !m); api?.maximize(); }
    if (key === 'close') { api?.close(); }
  };

  return (
    <div className="titlebar-drag" style={{height:32,background:'var(--bg-sidebar)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',flexShrink:0,userSelect:'none',zIndex:50}}>

        <div style={{width:18,height:18,borderRadius:5,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{fontSize:10,color:'#fff',fontWeight:800,letterSpacing:'-0.04em'}}>M</span>
        </div>
      </div>
      <span style={{fontSize:12,color:'var(--text-3)',flex:1,fontWeight:400,letterSpacing:'0.01em'}}>Meg</span>
      {/* LM Studio connection dot */}
      {lmStatus !== undefined && (
        <div style={{display:'flex',alignItems:'center',gap:4,marginRight:8}} title={lmStatus ? 'LM Studio connected' : 'LM Studio offline'}>

const CommandPalette = ({onClose,onAction,threads,workspaces,activeFile}) => {
  const [query,setQuery] = useState('');
  const [cursor,setCursor] = useState(0);
  const inputRef = useRef(null);
  useEffect(()=>{inputRef.current?.focus();},[]);

  // Build dynamic items
  const threadItems = (threads||[]).map(t => ({ group:'Chats', icon:'sms', label:t.title, action:'open-chat', id:t.id }));
  const wsItems = (workspaces||[]).map(w => ({ group:'Workspaces', icon:'workspace', label:w.name, action:'nav', id:'workspace', wsId:w.id }));
  const fileItems = activeFile ? [{ group:'Active File', icon:'doc', label:activeFile.name, action:'nav', id:'filebrowser' }] : [];
  
  const allItems = [...threadItems, ...wsItems, ...fileItems, ...CMD_ITEMS.filter(i => i.group === 'Commands')];

  const filtered = query ? allItems.filter(i=>i.label.toLowerCase().includes(query.toLowerCase())) : allItems;
  const grouped = filtered.reduce((acc,item)=>{ (acc[item.group]=acc[item.group]||[]).push(item); return acc; },{});

  const handleKey = e => {
    if (e.key==='ArrowDown'){e.preventDefault();setCursor(c=>Math.min(c+1,filtered.length-1));}
    if (e.key==='ArrowUp'){e.preventDefault();setCursor(c=>Math.max(c-1,0));}
    if (e.key==='Enter'){e.preventDefault();if(filtered[cursor]){onAction(filtered[cursor]);onClose();}}
    if (e.key==='Escape') onClose();
  };
  return (

                const i = filtered.indexOf(item); const active = cursor===i;
                return (
                  <button key={item.label + item.id} onClick={()=>{onAction(item);onClose();}} onMouseEnter={()=>setCursor(i)}
                    style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'8px 16px',background:active?'var(--accent-bg)':'transparent',border:'none',cursor:'pointer',textAlign:'left',transition:'background 0.08s'}}>

                      <Icon name={item.icon} size={13} color={active?'#fff':'var(--text-3)'}/>
                    </div>
                    <span style={{fontSize:13.5,color:active?'var(--accent)':'var(--text)',fontWeight:active?500:400}}>{item.label}</span>
                    <span style={{marginLeft:'auto',fontSize:11,color:'var(--text-3)'}}>{item.group}</span>
                  </button>
                );
              })}
            </div>
          ))}
          {filtered.length===0 && <div style={{padding:'24px 16px',textAlign:'center',color:'var(--text-3)',fontSize:13}}>No results for "{query}"</div>}
        </div>
      </div>
    </div>
  );
};

const FileBrowser = () => {
  const [tree, setTree] = useState(FILE_TREE);
  const [selected, setSelected] = useState(null);
  const [query, setQuery] = useState('');
  const [rootPath, setRootPath] = useState(null);
  const [fileContent, setFileContent] = useState(null);

  const openFolder = async () => {
    const r = await window.electronAPI?.openFolder();
    if(r?.filePaths?.[0]) {
      const dir = r.filePaths[0];
      setRootPath(dir);
      const entries = await window.electronAPI.listDir(dir);
      if(!entries.error) {
        setTree(entries.map(e=>({
          name:e.name, type:e.isDir?'folder':'file', ext:e.ext||'',
          path:e.path, open:false, children:e.isDir?[]:undefined,
        })));
      }
    }
  };

  const refresh = async () => {
    if(!rootPath) return;
    const entries = await window.electronAPI.listDir(rootPath);
    if(!entries.error) {
      setTree(entries.map(e=>({
        name:e.name, type:e.isDir?'folder':'file', ext:e.ext||'',
        path:e.path, open:false, children:e.isDir?[]:undefined,
      })));
    }
  };

  const toggleFolder = async (target) => {
    if(target.type==='folder' && window.electronAPI && !target.loaded) {
      const entries = await window.electronAPI.listDir(target.path);
      const children = entries.error ? [] : entries.map(e=>({
        name:e.name, type:e.isDir?'folder':'file', ext:e.ext||'', path:e.path, open:false, children:e.isDir?[]:undefined,
      }));
      const patch = items => items.map(item =>
        item===target ? {...item,open:true,loaded:true,children} :
        item.children ? {...item,children:patch(item.children)} : item
      );
      setTree(t=>patch(t));
    } else {
      const toggle = items => items.map(item =>
        item===target ? {...item,open:!item.open} :
        item.children ? {...item,children:toggle(item.children)} : item
      );
      setTree(t=>toggle(t));
    }
  };

  const selectFile = async (item) => {
    setSelected(item);
    if(item.type==='file' && window.electronAPI) {
      const r = await window.electronAPI.readFile(item.path);
      const content = r.content || r.error || '// Could not read file';
      setFileContent(content);
      window.dispatchEvent(new CustomEvent('meg:action', {
        detail: { action: 'openFile', value: { name: item.name, path: item.path, content, ext: item.ext } }
      }));
    }

              <Icon name="folder" size={13}/>
            </button>
            <button onClick={()=>{const name=prompt('New file name:');if(name?.trim())window.dispatchEvent(new CustomEvent('meg:action',{detail:{action:'sendToChat',text:`Create a new file named \`${name.trim()}\`${rootPath?' in '+rootPath:''}.`}}));}} style={{width:24,height:24,borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-3)',transition:'background 0.1s',border:'none',background:'transparent',cursor:'pointer'}} title="New file" onMouseEnter={e=>e.currentTarget.style.background='var(--bg-hover)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>

            <Icon name="search" size={11} color="var(--text-3)"/>

          </div>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'4px 0'}}>

              <Icon name="doc" size={14} color={EXT_COLORS[selected.ext]||'var(--text-3)'}/>

              <div style={{marginLeft:'auto',display:'flex',gap:6}}>

                  <Icon name="build" size={11} color="var(--text-3)"/> Edit

/* ══════════════════════════════════════════════════════
   VOICE INPUT
══════════════════════════════════════════════════════ */
const VoiceInput = ({onTranscribe}) => {
  const [state, setState] = useState('idle'); // idle | listening | error
  const recogRef = useRef(null);

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  const toggle = () => {
    if(!SpeechRecognition) {
      alert('Speech recognition is not supported in this browser/environment.');
      return;
    }
    if(state !== 'idle') {
      recogRef.current?.stop();
      setState('idle');
      return;
    }
    const recog = new SpeechRecognition();
    recog.lang = 'en-US';
    recog.interimResults = false;
    recog.maxAlternatives = 1;
    recogRef.current = recog;

    recog.onstart  = () => setState('listening');
    recog.onresult = e => {
      const transcript = e.results[0][0].transcript;
      onTranscribe(transcript);
      setState('idle');
    };
    recog.onerror  = () => setState('idle');
    recog.onend    = () => setState('idle');
    recog.start();
  };

  useEffect(() => () => recogRef.current?.stop(), []);

  return (
    <button onClick={toggle} title={state==='idle'?'Voice input':'Stop listening'} className="btn-pressable"
      style={{width:30,height:30,borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',background:state!=='idle'?'var(--accent-bg)':'transparent',border:state!=='idle'?'1px solid var(--accent-border)':'none',color:state!=='idle'?'var(--accent)':'var(--text-3)',transition:'background 0.15s,color 0.15s,border-color 0.15s',flexShrink:0}}
      onMouseEnter={e=>{if(state==='idle'){e.currentTarget.style.background='var(--bg-hover)';e.currentTarget.style.color='var(--text-2)';}}}
      onMouseLeave={e=>{if(state==='idle'){e.currentTarget.style.background='transparent';e.currentTarget.style.color='var(--text-3)';}}}
    >
      {state==='listening' ? (
        <div style={{display:'flex',gap:2,alignItems:'center'}}>
          {[0,1,2,3,4].map(i=><div key={i} className="wave-bar"/>)}
        </div>
      ) : (
        <Icon name="mic" size={14}/>
      )}
    </button>
  );
};

/* ══════════════════════════════════════════════════════
   QUICK CAPTURE  (Ctrl+Shift+M)
══════════════════════════════════════════════════════ */
const QuickCapture = ({onClose, onSend}) => {
  const [val, setVal] = useState('');
  const [recent] = useState(['Run the test suite','Draft reply to Alex','Summarize this week','Fix the auth bug']);
  const inputRef = useRef(null);
  useEffect(()=>{ inputRef.current?.focus(); },[]);
  const submit = (text) => { if(text.trim()){onSend(text.trim());onClose();} };
  return (
    <div style={{position:'fixed',inset:0,zIndex:950,display:'flex',alignItems:'center',justifyContent:'center',animation:'backdropIn 0.15s ease'}} onClick={onClose}>
      <div style={{position:'absolute',inset:0,background:'rgba(8,6,18,0.6)',backdropFilter:'blur(6px)'}}/>
      <div style={{width:540,position:'relative',animation:'modalIn 0.22s cubic-bezier(0.22,1,0.36,1)'}} onClick={e=>e.stopPropagation()}>
        {/* Main input */}
        <div style={{background:'var(--bg-2)',borderRadius:14,border:'1px solid var(--border)',boxShadow:`0 32px 80px var(--shadow-lg), 0 0 0 1px rgba(255,255,255,0.05)`,overflow:'hidden'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'14px 18px',borderBottom:'1px solid var(--border-light)'}}>
            <div style={{width:28,height:28,borderRadius:8,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <span style={{fontSize:13,color:'#fff',fontWeight:800,letterSpacing:'-0.03em'}}>M</span>
            </div>
            <input ref={inputRef} value={val} onChange={e=>setVal(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey)submit(val);if(e.key==='Escape')onClose();}}
              placeholder="Ask Meg anything, or drop a task…"
              style={{flex:1,border:'none',outline:'none',fontSize:15,color:'var(--text)',background:'none',fontFamily:'inherit'}}/>
            <kbd style={{fontSize:10,color:'var(--text-3)',background:'var(--bg-active)',padding:'2px 6px',borderRadius:4,border:'1px solid var(--border)',flexShrink:0}}>Esc</kbd>
          </div>

          {/* Recent */}
          <div style={{padding:'6px 8px 8px'}}>
            <div style={{fontSize:10.5,fontWeight:600,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'0.06em',padding:'4px 10px 6px'}}>Recent</div>
            {recent.map((r,i)=>(
              <button key={i} onClick={()=>submit(r)} style={{width:'100%',display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:7,background:'transparent',border:'none',cursor:'pointer',textAlign:'left',transition:'background 0.08s',animation:`fadeUp 0.15s ${i*0.04}s both`}}
                onMouseEnter={e=>e.currentTarget.style.background='var(--bg-hover)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <Icon name="chat" size={13} color="var(--text-3)"/>
                <span style={{fontSize:13.5,color:'var(--text-2)'}}>{r}</span>
                <Icon name="chevronRight" size={13} color="var(--text-3)" style={{marginLeft:'auto'}}/>
              </button>
            ))}
          </div>

          {val.trim() && (
            <div style={{padding:'8px 16px',borderTop:'1px solid var(--border-light)',display:'flex',justifyContent:'flex-end'}}>
              <button onClick={()=>submit(val)} className="btn-pressable" style={{padding:'7px 18px',borderRadius:8,background:'var(--accent)',color:'#fff',fontSize:13,fontWeight:600,border:'none',cursor:'pointer'}}>
                Send to Meg →
              </button>
            </div>
          )}
        </div>
        <div style={{textAlign:'center',marginTop:8}}>
          <span style={{fontSize:11,color:'rgba(255,255,255,0.3)'}}>Ctrl+Shift+M to open anywhere</span>
        </div>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   TRAY FLYOUT
══════════════════════════════════════════════════════ */
const TrayFlyout = ({notifs, onClose, onMarkAllRead}) => {
  const unread = notifs.filter(n=>!n.read);
  return (
    <div style={{position:'absolute',bottom:0,right:0,width:320,background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:'12px 12px 0 0',boxShadow:`0 -8px 40px var(--shadow-lg)`,zIndex:300,overflow:'hidden',animation:'slideDown 0.22s cubic-bezier(0.22,1,0.36,1)'}}>
      {/* Header */}
      <div style={{padding:'12px 16px 10px',borderBottom:'1px solid var(--border-light)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:20,height:20,borderRadius:6,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <span style={{fontSize:10,color:'#fff',fontWeight:800}}>M</span>
          </div>
          <span style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>Meg</span>
          {unread.length>0 && <span style={{fontSize:10.5,background:'var(--orange)',color:'#fff',padding:'1px 6px',borderRadius:99,fontWeight:600}}>{unread.length} new</span>}
        </div>
        <button onClick={onClose} style={{color:'var(--text-3)',display:'flex'}} onMouseEnter={e=>e.currentTarget.style.color='var(--text)'} onMouseLeave={e=>e.currentTarget.style.color='var(--text-3)'}><Icon name="close" size={13}/></button>
      </div>

      {/* Notifications */}
      <div style={{maxHeight:220,overflowY:'auto'}}>
        {notifs.slice(0,4).map((n,i)=>(
          <div key={n.id} style={{padding:'8px 16px',display:'flex',gap:10,alignItems:'flex-start',background:n.read?'transparent':'var(--accent-bg)',borderBottom:'1px solid var(--border-light)',animation:`fadeUp 0.15s ${i*0.04}s both`}}>
            <div style={{width:26,height:26,borderRadius:'50%',background:'var(--bg-active)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>
              <Icon name={n.icon} size={12} color={n.color}/>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:n.read?400:500,color:'var(--text)',marginBottom:1}}>{n.title}</div>
              <div style={{fontSize:11,color:'var(--text-3)'}}>{n.body}</div>
            </div>
            {!n.read && <div style={{width:6,height:6,borderRadius:'50%',background:'var(--accent)',flexShrink:0,marginTop:5}}/>}
          </div>
        ))}
      </div>

      {/* Quick actions */}
      <div style={{padding:'8px 12px',borderTop:'1px solid var(--border-light)',display:'flex',gap:6}}>
        {[{icon:'chat',label:'Open Meg'},{icon:'plus',label:'New task'},{icon:'check',label:'Mark all read'}].map((a,i)=>(
          <button key={i} onClick={a.label==='Mark all read'?onMarkAllRead:undefined} style={{flex:1,padding:'6px 4px',borderRadius:7,border:'1px solid var(--border)',background:'var(--bg)',display:'flex',flexDirection:'column',alignItems:'center',gap:3,cursor:'pointer',fontSize:10.5,color:'var(--text-2)',transition:'all 0.12s'}}
            onMouseEnter={e=>{e.currentTarget.style.background='var(--bg-hover)';e.currentTarget.style.borderColor='var(--accent-border)';}}
            onMouseLeave={e=>{e.currentTarget.style.background='var(--bg)';e.currentTarget.style.borderColor='var(--border)';}}>
            <Icon name={a.icon} size={14} color="var(--text-3)"/>
            {a.label}
          </button>
        ))}
      </div>
    </div>
  );
};

const TYPE_LABELS = {all:'All',agent:'Agents',sms:'Telegram',commit:'Commits',file:'Files',memory:'Memory'};

const TimelineView = ({events}) => {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const filtered = events.filter(e=>(filter==='all'||e.type===filter)&&(search===''||e.title.toLowerCase().includes(search.toLowerCase())||e.detail.toLowerCase().includes(search.toLowerCase())));
  const grouped = filtered.reduce((acc,e)=>{ (acc[e.date]=acc[e.date]||[]).push(e); return acc; },{});

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {/* Search + filter bar */}
      <div style={{padding:'12px 20px',borderBottom:'1px solid var(--border-light)',background:'var(--bg)',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
          <div style={{flex:1,display:'flex',alignItems:'center',gap:8,background:'var(--bg-panel)',border:'1px solid var(--border)',borderRadius:8,padding:'7px 12px'}}>
            <Icon name="search" size={14} color="var(--text-3)"/>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search activity…" style={{flex:1,border:'none',outline:'none',fontSize:13,color:'var(--text)',background:'none',fontFamily:'inherit'}}/>
          </div>
          <span style={{fontSize:11.5,color:'var(--text-3)'}}>{filtered.length} events</span>
        </div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
          {Object.entries(TYPE_LABELS).map(([type,label])=>(
            <button key={type} onClick={()=>setFilter(type)} style={{padding:'3px 10px',borderRadius:99,fontSize:11.5,border:`1px solid ${filter===type?'var(--accent-border)':'var(--border)'}`,background:filter===type?'var(--accent-bg)':'transparent',color:filter===type?'var(--accent)':'var(--text-3)',cursor:'pointer',transition:'all 0.12s',fontFamily:'inherit',fontWeight:filter===type?500:400}}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {/* Timeline */}
      <div style={{flex:1,overflowY:'auto',padding:'0 20px'}}>
        {Object.entries(grouped).map(([date,events])=>(
          <div key={date}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'0.06em',padding:'14px 0 8px',position:'sticky',top:0,background:'var(--bg)',zIndex:1}}>{date}</div>
            {events.map((e,i)=>(
              <div key={e.id} style={{display:'flex',gap:10,alignItems:'stretch',animation:`fadeUp 0.15s ${i*0.04}s both`}}>
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',width:28,flexShrink:0,paddingTop:2}}>
                  <div style={{width:26,height:26,borderRadius:'50%',background:'var(--bg-active)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <Icon name={e.icon} size={12} color={e.color}/>
                  </div>
                  {i<events.length-1 && <div style={{width:1,flex:1,background:'var(--border)',margin:'3px 0'}}/>}
                </div>
                <div style={{flex:1,paddingBottom:14,paddingTop:2}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:2}}>
                    <span style={{fontSize:13,color:'var(--text)',fontWeight:500,lineHeight:1.4}}>{e.title}</span>
                    <span style={{fontSize:10.5,color:'var(--text-3)',flexShrink:0}}>{e.time}</span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:11.5,color:'var(--text-3)'}}>{e.detail}</span>
                    {e.ws!=='—' && <span style={{fontSize:10,padding:'1px 5px',borderRadius:99,background:'var(--bg-active)',border:'1px solid var(--border)',color:'var(--text-3)'}}>{e.ws}</span>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        ))}
        {filtered.length===0 && <div style={{padding:'40px 0',textAlign:'center',color:'var(--text-3)',fontSize:13}}>No events match "{search}"</div>}
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   AUTOMATIONS VIEW
══════════════════════════════════════════════════════ */
const INIT_AUTOS = [
  {id:'auto1',name:'PR Auto-Review',trigger:{icon:'git',label:'on PR opened',color:'#8b5cf6'},actions:[{icon:'agent',label:'Run pr-reviewer'},{icon:'sms',label:'Notify via Telegram'}],enabled:true,runs:12,lastRun:'1d ago'},
  {id:'auto2',name:'Weekly Report',trigger:{icon:'agent',label:'Every Friday 5pm',color:'var(--orange)'},actions:[{icon:'agent',label:'Run weekly-report'},{icon:'sms',label:'Send to eng@company.com'}],enabled:true,runs:4,lastRun:'3d ago'},
  {id:'auto3',name:'Deploy on Merge',trigger:{icon:'git',label:'on merge to main',color:'#8b5cf6'},actions:[{icon:'agent',label:'Run deploy-pipeline'},{icon:'sms',label:'Text me when done'}],enabled:false,runs:0,lastRun:'Never'},
];

const AutomationsView = () => {
  const [autos, setAutos] = useState(INIT_AUTOS);
  const [selected, setSelected] = useState('auto1');
  const _autosFirst = useRef(true);
  useEffect(()=>{
    if(!window.electronAPI) return;
    window.electronAPI.dbLoad('automations').then(data=>{
      if(data?.length){ setAutos(data); setSelected(data[0].id); }
    });
  },[]);
  useEffect(()=>{
    if(_autosFirst.current){_autosFirst.current=false;return;}
    window.electronAPI?.dbSaveAll('automations', autos);
  },[autos]);
  const auto = autos.find(a=>a.id===selected);

  return (
    <div style={{flex:1,display:'flex',minWidth:0,overflow:'hidden'}}>
      {/* List */}
      <div style={{width:240,borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',background:'var(--bg)',flexShrink:0}}>
        <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border-light)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>Automations</span>
          <button onClick={()=>{const id='auto-'+Date.now();const name='New automation';setAutos(as=>[...as,{id,name,trigger:{icon:'zap',label:'manual only',color:'var(--accent)'},actions:[],enabled:false,runs:0,lastRun:'Never'}]);setSelected(id);}} style={{color:'var(--accent)',display:'flex',border:'none',background:'transparent',cursor:'pointer'}}><Icon name="plus" size={15} color="var(--accent)"/></button>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'6px 8px'}}>
          {autos.map((a,i)=>(
            <button key={a.id} onClick={()=>setSelected(a.id)} style={{width:'100%',padding:'10px',borderRadius:8,display:'flex',flexDirection:'column',gap:4,background:selected===a.id?'var(--bg-active)':'transparent',border:'none',cursor:'pointer',textAlign:'left',marginBottom:3,transition:'background 0.1s',animation:`fadeUp 0.15s ${i*0.06}s both`}}
              onMouseEnter={e=>{if(selected!==a.id)e.currentTarget.style.background='var(--bg-hover)';}} onMouseLeave={e=>{if(selected!==a.id)e.currentTarget.style.background='transparent';}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:12.5,fontWeight:600,color:'var(--text)'}}>{a.name}</span>
                <div style={{width:8,height:8,borderRadius:'50%',background:a.enabled?'var(--green)':'var(--border)',flexShrink:0}}/>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:5}}>
                <Icon name={a.trigger.icon} size={11} color={a.trigger.color}/>
                <span style={{fontSize:11,color:'var(--text-3)'}}>{a.trigger.label}</span>
              </div>
              <span style={{fontSize:10.5,color:'var(--text-3)'}}>{a.runs} runs · last {a.lastRun}</span>
            </button>
          ))}
        </div>
        <div style={{padding:'8px',borderTop:'1px solid var(--border-light)'}}>
          <button onClick={()=>{
            const id='auto-'+Date.now();
            const name='New automation';
            setAutos(as=>[...as,{id,name,trigger:{icon:'zap',label:'manual only',color:'var(--accent)'},actions:[],enabled:false,runs:0,lastRun:'Never'}]);
            setSelected(id);
          }} style={{width:'100%',height:32,borderRadius:7,border:'1px dashed var(--border)',background:'transparent',display:'flex',alignItems:'center',justifyContent:'center',gap:6,cursor:'pointer',fontSize:12,color:'var(--text-3)',transition:'all 0.12s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.color='var(--accent)';}} onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--text-3)';}}>
            <Icon name="plus" size={13}/> New automation
          </button>
        </div>
      </div>

      {/* Builder */}
      {auto && (
        <div style={{flex:1,overflowY:'auto',padding:'24px 28px',animation:'navIn 0.2s ease'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:28}}>
            <div>
              <h2 style={{fontSize:16,fontWeight:700,color:'var(--text)',letterSpacing:'-0.02em',marginBottom:4}}>{auto.name}</h2>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <StatusBadge status={auto.enabled?'done':'queued'}/>
                <span style={{fontSize:11.5,color:'var(--text-3)'}}>{auto.runs} runs · last {auto.lastRun}</span>
              </div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <Toggle on={auto.enabled} onToggle={()=>setAutos(as=>as.map(a=>a.id===selected?{...a,enabled:!a.enabled}:a))}/>
              <button onClick={()=>{
                setAutos(as=>as.map(a=>a.id===selected?{...a,runs:a.runs+1,lastRun:'just now'}:a));

              }} style={{padding:'6px 14px',borderRadius:7,border:'none',background:'var(--accent)',color:'#fff',fontSize:12,fontWeight:500,display:'flex',alignItems:'center',gap:5,cursor:'pointer'}}>
                <Icon name="play" size={12} color="#fff"/> Run now

            </div>
          </div>

          {/* Visual flow */}
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-start',gap:0}}>
            {/* Trigger */}
            <div style={{fontSize:10,fontWeight:600,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:6}}>Trigger</div>
            <div className="auto-card" style={{padding:'12px 16px',borderRadius:10,border:`1.5px solid ${auto.trigger.color}44`,background:`${auto.trigger.color}11`,display:'flex',alignItems:'center',gap:10,minWidth:280,marginBottom:0}}>
              <div style={{width:32,height:32,borderRadius:8,background:`${auto.trigger.color}22`,border:`1px solid ${auto.trigger.color}44`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <Icon name={auto.trigger.icon} size={15} color={auto.trigger.color}/>
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{auto.trigger.label}</div>
                <div style={{fontSize:11.5,color:'var(--text-3)'}}>Trigger condition</div>
              </div>
            </div>

            {/* Connector line */}
            <div style={{width:1.5,height:24,background:'var(--border)',marginLeft:22}}/>
            <div style={{fontSize:10,fontWeight:600,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:6}}>Actions</div>

            {/* Actions */}
            {auto.actions.map((action,i)=>(
              <React.Fragment key={i}>
                <div className="auto-card" style={{padding:'12px 16px',borderRadius:10,border:'1.5px solid var(--border)',background:'var(--bg-2)',display:'flex',alignItems:'center',gap:10,minWidth:280}}>
                  <div style={{width:32,height:32,borderRadius:8,background:'var(--accent-bg)',border:'1px solid var(--accent-border)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <Icon name={action.icon} size={15} color="var(--accent)"/>
                  </div>
                  <div>
                    <div style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>{action.label}</div>
                    <div style={{fontSize:11.5,color:'var(--text-3)'}}>Action {i+1}</div>
                  </div>
                  <button onClick={()=>setAutos(as=>as.map(a=>a.id===selected?{...a,actions:a.actions.filter((_,j)=>j!==i)}:a))} style={{marginLeft:'auto',color:'var(--text-3)',display:'flex',opacity:0.5,cursor:'pointer',background:'none',border:'none'}} onMouseEnter={e=>e.currentTarget.style.opacity='1'} onMouseLeave={e=>e.currentTarget.style.opacity='0.5'}>
                    <Icon name="trash" size={13}/>
                  </button>
                </div>
                {i<auto.actions.length-1 && <div style={{width:1.5,height:16,background:'var(--border)',marginLeft:22}}/>}
              </React.Fragment>
            ))}

            {/* Add action */}

  const steps = agent.liveSteps || [{label:'Initializing…',status:'active'}];
  const pct = agent.steps ? Math.round((agent.doneSteps/agent.steps)*100) : 0;

  return (
    <div style={{flex:1,display:'flex',minWidth:0,overflow:'hidden'}}>
      {/* List */}
      <div style={{width:260,borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',background:'var(--bg)',flexShrink:0}}>
        <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border-light)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>All Agents</span>
          {allAgents.some(a=>a.status==='running') && (
            <span style={{fontSize:11,padding:'2px 7px',borderRadius:99,background:'var(--accent-bg)',color:'var(--accent)',border:'1px solid var(--accent-border)',fontWeight:500,display:'flex',alignItems:'center',gap:4}}>
              <span style={{display:'inline-flex',animation:'spin 1.2s linear infinite'}}><Icon name="spinner" size={10} color="var(--accent)"/></span>
              {allAgents.filter(a=>a.status==='running').length} running
            </span>
          )}
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'6px 8px'}}>
          {allAgents.map(a=>{
            const isSub = !!a.parentId;
            const parent = isSub ? allAgents.find(x => x.id === a.parentId) : null;
            return (
              <button key={a.id} onClick={()=>setSelected(a.id)} style={{width:'100%',padding:'10px',paddingLeft:isSub?28:10,borderRadius:6,display:'flex',flexDirection:'column',gap:5,background:selected===a.id?'var(--bg-active)':'transparent',border:'none',cursor:'pointer',textAlign:'left',marginBottom:2,transition:'background 0.1s',position:'relative'}}
                onMouseEnter={e=>{if(selected!==a.id)e.currentTarget.style.background='var(--bg-hover)';}} onMouseLeave={e=>{if(selected!==a.id)e.currentTarget.style.background='transparent';}}>
                {isSub && <div style={{position:'absolute',left:14,top:14,bottom:14,width:1.5,background:'var(--border)',borderRadius:99}}/>}
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:6}}>
                  <span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:11.5,color:'var(--text)',fontWeight:500,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {isSub && <span style={{color:'var(--text-3)',marginRight:4}}>↳</span>}
                    {a.task}
                  </span>
                  <StatusBadge status={a.status} small/>
                </div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:11,color:'var(--text-3)'}}>{isSub ? `Parent: ${parent?.task || 'Unknown'}` : a.thread}</span>
                  <span style={{fontSize:10.5,fontFamily:'"JetBrains Mono",monospace',color:'var(--text-3)'}}>{a.duration}</span>
                </div>
                {(a.status==='running'||a.status==='done') && (
                  <div style={{height:3,background:'var(--border)',borderRadius:99,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${a.steps ? Math.round((a.doneSteps/a.steps)*100) : 0}%`,background:a.status==='done'?'var(--green)':'var(--accent)',borderRadius:99,transition:'width 0.6s ease'}}/>
                  </div>
                )}
              </button>
            );
          })}
        </div>
      </div>

      {/* Detail */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Header */}
        <div style={{padding:'12px 18px',borderBottom:'1px solid var(--border-light)',background:'var(--bg)',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
            <span style={{display:'inline-flex',animation:agent.status==='running'?'spin 1.2s linear infinite':'none'}}>
              {agent.status==='done'?<Icon name="check" size={16} color="var(--green)"/>:<Icon name="spinner" size={16} color={agent.status==='running'?'var(--accent)':'var(--text-3)'}/>}
            </span>
            <span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:14,fontWeight:600,color:'var(--text)'}}>{agent.task}</span>
            <StatusBadge status={agent.status}/>
            {newlyDone && selected==='a2' && (
              <span style={{fontSize:11,padding:'2px 8px',borderRadius:99,background:'var(--green-bg)',color:'var(--green)',border:'1px solid var(--green-border)',animation:'fadeUp 0.3s ease'}}>just completed</span>
            )}
          </div>
          <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
            {[{label:'Model',val:agent.model},{label:'Duration',val:agent.duration},{label:'Steps',val:`${agent.doneSteps}/${agent.steps}`},{label:'Thread',val:agent.thread}].map(m=>(
              <div key={m.label}>
                <div style={{fontSize:10,color:'var(--text-3)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:2}}>{m.label}</div>
                <div style={{fontSize:12,color:'var(--text-2)',fontFamily:['Model','Duration','Steps'].includes(m.label)?'"JetBrains Mono",monospace':'inherit'}}>{m.val}</div>
              </div>
            ))}
            {agent.parentId && (
              <div>
                <div style={{fontSize:10,color:'var(--text-3)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:2}}>Parent Agent</div>
                <div style={{fontSize:12,color:'var(--accent)',fontWeight:500,cursor:'pointer'}} onClick={()=>setSelected(agent.parentId)}>
                  {allAgents.find(x=>x.id===agent.parentId)?.task || 'Unknown'}
                </div>
              </div>
            )}
            {allAgents.some(x=>x.parentId===agent.id) && (
              <div>
                <div style={{fontSize:10,color:'var(--text-3)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:2}}>Sub-agents</div>
                <div style={{display:'flex',gap:6}}>
                  {allAgents.filter(x=>x.parentId===agent.id).map(s=>(
                    <div key={s.id} style={{fontSize:12,color:'var(--accent)',fontWeight:500,cursor:'pointer'}} onClick={()=>setSelected(s.id)}>
                      {s.task}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
          {(agent.status==='running'||agent.status==='done') && (
            <div style={{marginTop:10}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                <span style={{fontSize:10,color:'var(--text-3)'}}>Progress</span>
                <span style={{fontSize:10,fontFamily:'"JetBrains Mono",monospace',color:'var(--text-3)'}}>{pct}%</span>
              </div>
              <div style={{height:4,background:'var(--border)',borderRadius:99,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${pct}%`,background:agent.status==='done'?'var(--green)':'var(--accent)',borderRadius:99,transition:'width 0.6s ease'}}/>
              </div>
            </div>
          )}
        </div>

        <div style={{flex:1,overflowY:'auto',padding:'16px 18px',display:'flex',gap:16}}>
          {/* Steps */}
          <div style={{flex:1}}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--text-3)',letterSpacing:'0.05em',textTransform:'uppercase',marginBottom:12}}>Steps</div>
            {steps.map((s,i)=>(
              <div key={i} style={{display:'flex',gap:10,marginBottom:14,animation:s.status==='done'&&i===steps.filter(x=>x.status==='done').length-1?'fadeUp 0.4s ease':'none'}}>
                <div style={{width:22,height:22,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,background:s.status==='done'?'var(--green-bg)':s.status==='active'?'var(--accent-bg)':'var(--bg-active)',border:`1.5px solid ${s.status==='done'?'var(--green-border)':s.status==='active'?'var(--accent-border)':'var(--border)'}`,animation:s.status==='active'?'spin 1.2s linear infinite':'none',transition:'background 0.3s,border-color 0.3s'}}>
                  {s.status==='done'?<Icon name="check" size={11} color="var(--green)"/>:s.status==='active'?<Icon name="spinner" size={11} color="var(--accent)"/>:<span style={{width:5,height:5,borderRadius:'50%',background:'var(--border)',display:'block'}}/>}
                </div>
                <div style={{flex:1,paddingTop:2}}>
                  <div style={{fontSize:12.5,color:s.status==='waiting'?'var(--text-3)':'var(--text)',fontWeight:s.status==='active'?500:400,transition:'color 0.3s'}}>{s.label}</div>
                  {s.status==='active' && <div style={{fontSize:11,color:'var(--accent)',marginTop:2,animation:'fadeUp 0.2s ease'}}>Running…</div>}
                  {s.status==='done' && <div style={{fontSize:11,color:'var(--green)',marginTop:2}}>Complete</div>}
                </div>
              </div>
            ))}
          </div>

          {/* Tool log */}
          <div style={{width:200,flexShrink:0}}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--text-3)',letterSpacing:'0.05em',textTransform:'uppercase',marginBottom:8}}>Tool log</div>
            <div style={{background:'var(--code-bg)',borderRadius:6,padding:'10px 12px',border:'1px solid var(--code-border)',marginBottom:12}}>
              {['read: middleware/auth.ts','read: lib/jwt.ts','exec: grep "refresh" **/*.ts','read: routes/auth.ts',agent.status==='running'?'…identifying pattern':'✓ found: race in refresh()'].map((l,i)=>(
                <div key={i} style={{fontFamily:'"JetBrains Mono",monospace',fontSize:10,color:i===4?(agent.status==='done'?'var(--code-green)':'#555'):'var(--code-blue)',lineHeight:1.8,transition:'color 0.4s'}}>{l}</div>
              ))}
            </div>
            <div style={{fontSize:11,fontWeight:600,color:'var(--text-3)',letterSpacing:'0.05em',textTransform:'uppercase',marginBottom:6}}>Tools</div>
            {agent.tools.map(t=>(
              <span key={t} style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,padding:'2px 7px',background:'var(--bg-panel)',border:'1px solid var(--border)',borderRadius:99,color:'var(--text-2)',marginRight:4,marginBottom:4}}>
                <Icon name={t==='fs'?'files':t==='terminal'?'terminal':'integration'} size={11} color="var(--text-3)"/>
                {t==='fs'?'File system':t==='terminal'?'Terminal':'Browser'}
              </span>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

  const [msgs, setMsgs] = useState([

                <span style={{fontSize:12,fontWeight:600,color:'#000'}}>9:41</span>
                <div style={{width:90,height:24,background:'#1a1a1a',borderRadius:99}}/>
                <span style={{fontSize:10,color:'#000',fontWeight:600}}>●●● WiFi</span>
              </div>
              <div style={{padding:'8px 16px',display:'flex',alignItems:'center',gap:10,borderBottom:'1px solid #e5e5ea',flexShrink:0}}>
                <div style={{width:32,height:32,borderRadius:'50%',background:'#3b6eff',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <span style={{fontSize:13,color:'#fff',fontWeight:700}}>M</span>

                <div>
                  <div style={{fontSize:13,fontWeight:600,color:'#000'}}>Meg</div>

                  <div key={i} style={{display:'flex',justifyContent:m.from==='me'?'flex-end':'flex-start',animation:'fadeUp 0.2s ease'}}>
                    <div style={{maxWidth:'78%',padding:'8px 12px',fontSize:12.5,lineHeight:1.45,borderRadius:m.from==='me'?'16px 16px 4px 16px':'16px 16px 16px 4px',background:m.from==='me'?'#3b6eff':'#e9e9eb',color:m.from==='me'?'#fff':'#000'}}>{m.text}</div>
                  </div>

              <div style={{padding:'8px 12px 16px',display:'flex',gap:8,alignItems:'center',borderTop:'1px solid #e5e5ea',flexShrink:0}}>

                  <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="Message…" style={{background:'none',border:'none',outline:'none',width:'100%',fontSize:12.5,color:'#000'}}/>

            </div>
            <div><label style={{fontSize:11,fontWeight:600,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'0.05em',display:'block',marginBottom:6}}>Model</label>
              {editing?<select value={agent.model} onChange={e=>setAgents(as=>as.map(a=>a.id===selected?{...a,model:e.target.value}:a))} style={{border:'1px solid var(--border)',borderRadius:6,padding:'7px 10px',fontSize:12.5,color:'var(--text)',background:'var(--bg-input)',outline:'none',width:'100%'}}>{MODELS.map(m=><option key={m}>{m}</option>)}</select>
              :<div style={{padding:'8px 12px',background:'var(--bg-panel)',border:'1px solid var(--border)',borderRadius:6,fontSize:12.5,color:'var(--text-2)',fontFamily:'"JetBrains Mono",monospace'}}>{agent.model}</div>}
            </div>
            <div><label style={{fontSize:11,fontWeight:600,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'0.05em',display:'block',marginBottom:8}}>Tools</label>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {TOOL_OPTS.map(t=>{const active=agent.tools.includes(t.id);return(
                  <div key={t.id} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 10px',borderRadius:6,border:`1px solid ${active?'var(--accent-border)':'var(--border)'}`,background:active?'var(--accent-bg)':'var(--bg-2)',cursor:editing?'pointer':'default',transition:'all 0.12s'}}
                    onClick={()=>editing&&setAgents(as=>as.map(a=>a.id===selected?{...a,tools:active?a.tools.filter(x=>x!==t.id):[...a.tools,t.id]}:a))}>
                    <Icon name={t.icon} size={13} color={active?'var(--accent)':'var(--text-3)'}/>
                    <span style={{fontSize:12,color:active?'var(--accent)':'var(--text-2)',fontWeight:active?500:400}}>{t.label}</span>
                  </div>
                );})}
              </div>
            </div>
            <div><label style={{fontSize:11,fontWeight:600,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'0.05em',display:'block',marginBottom:8}}>Steps</label>
              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                {agent.steps.map((step,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:6}}>
                    <div style={{width:20,height:20,borderRadius:'50%',background:'var(--bg-active)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><span style={{fontSize:10,color:'var(--text-3)',fontWeight:600}}>{i+1}</span></div>
                    <span style={{flex:1,fontSize:12.5,color:'var(--text-2)'}}>{step}</span>
                    {editing && <button onClick={()=>setAgents(as=>as.map(a=>a.id===selected?{...a,steps:a.steps.filter((_,j)=>j!==i)}:a))} style={{color:'var(--text-3)',display:'flex',opacity:0.5,border:'none',background:'transparent',cursor:'pointer'}} onMouseEnter={e=>e.currentTarget.style.opacity='1'} onMouseLeave={e=>e.currentTarget.style.opacity='0.5'}><Icon name="trash" size={13}/></button>}
                  </div>
                ))}
                {editing && <button onClick={()=>{const s=prompt('New step:');if(s?.trim())setAgents(as=>as.map(a=>a.id===selected?{...a,steps:[...a.steps,s.trim()]}:a));}} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 10px',borderRadius:6,border:'1px dashed var(--border)',background:'transparent',cursor:'pointer',color:'var(--text-3)',fontSize:12}} onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.color='var(--accent)';}} onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--text-3)';}}>
                  <Icon name="plus" size={13}/> Add step
                </button>}
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0',borderTop:'1px solid var(--border-light)'}}>
              <div><div style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>Enable agent</div><div style={{fontSize:11.5,color:'var(--text-3)'}}>Runs automatically when triggered</div></div>
              <Toggle on={agent.enabled} onToggle={()=>setAgents(as=>as.map(a=>a.id===selected?{...a,enabled:!a.enabled}:a))}/>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const SettingsView = () => {
  const [section,setSection] = useState('model');

  const deleteMemory = i => { const next=memories.filter((_,j)=>j!==i); setMemories(next); localStorage.setItem('meg:memories',JSON.stringify(next)); };
  const [themeChoice,setThemeChoice] = useState(()=>localStorage.getItem('meg:theme')||'light');
  const [integrations,setIntegrations] = useState({Telegram:false,GitHub:false});

  const saveLmUrl = async (url) => {
    setLmUrl(url);

  };
  const testLmUrl = async () => {
    setLmUrlStatus('checking');
    window.electronAPI?.setSetting('lmStudioUrl', lmUrl);
    const r = await window.electronAPI?.ping();
    setLmUrlStatus(r || {ok:false,error:'No response'});
    if (r?.ok) {
      const mods = await window.electronAPI?.getModels();
      setLocalModels((mods||[]).map(m=>m.id||m));
    }
  };
  useEffect(()=>{
    if(!window.electronAPI) return;
    window.electronAPI.getModels().then(mods=>setLocalModels((mods||[]).map(m=>m.id||m)));
  },[]);

  const saveModel = m => {
    setModel(m);
    localStorage.setItem('meg:model', m);
    window.electronAPI?.setSetting('model', m);
    window.dispatchEvent(new CustomEvent('meg:action', {detail:{action:'setModel',value:m}}));
  };
  const saveTgToken = t => { setTelegramToken(t); localStorage.setItem('meg:telegramToken',t); window.electronAPI?.setSetting('telegramToken',t); };
  const saveTgChatId = id => { setTelegramChatId(id); localStorage.setItem('meg:telegramChatId',id); window.electronAPI?.setSetting('telegramChatId',id); };
  const saveApiKey = (provider,val) => { const next={...apiKeys,[provider]:val}; setApiKeys(next); localStorage.setItem('meg:apiKeys',JSON.stringify(next)); window.electronAPI?.setSetting('apiKeys',next); };

  const validateTg = async () => {
    if(!telegramToken.trim()) return;
    setTgStatus('checking');
    const r = await window.electronAPI?.validateTelegramToken(telegramToken);
    setTgStatus(r||{ok:false,error:'No response'});

          <button key={s.id} onClick={()=>setSection(s.id)} style={{width:'100%',padding:'8px 10px',borderRadius:6,display:'flex',alignItems:'center',gap:8,background:section===s.id?'var(--bg-active)':'transparent',border:'none',cursor:'pointer',marginBottom:2,textAlign:'left',transition:'background 0.1s'}}>

          </div>
        </div>}

          <p style={{fontSize:12.5,color:'var(--text-3)',marginBottom:20,lineHeight:1.6}}>Meg remembers facts across conversations.</p>

/* ── Markdown renderer ─────────────────────────────────────── */
const CodeBlock = ({lang,code}) => {
  const [copied,setCopied] = useState(false);
  const copy = () => { navigator.clipboard?.writeText(code); setCopied(true); setTimeout(()=>setCopied(false),1500); };
  return (
    <div style={{margin:'8px 0',borderRadius:8,overflow:'hidden',border:'1px solid var(--border)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'5px 12px',background:'var(--bg-active)',borderBottom:'1px solid var(--border)'}}>
        <span style={{fontSize:11,fontFamily:'"JetBrains Mono",monospace',color:'var(--text-3)',fontWeight:500}}>{lang||'code'}</span>
        <button onClick={copy} style={{fontSize:11,color:copied?'var(--green)':'var(--text-3)',border:'none',background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',gap:4,padding:0}}>
          <Icon name={copied?'check':'doc'} size={11} color={copied?'var(--green)':'var(--text-3)'}/>{copied?'Copied':'Copy'}
        </button>
      </div>
      <pre style={{margin:0,padding:'12px 14px',fontSize:12.5,fontFamily:'"JetBrains Mono",monospace',lineHeight:1.55,overflowX:'auto',background:'var(--bg-2)',color:'var(--text)',whiteSpace:'pre'}}><code>{code}</code></pre>
    </div>
  );
};

const renderInline = (text) => {
  if(!text) return null;
  return text.split(/(`[^`\n]+`)/g).flatMap((seg,i)=>{
    if(seg.startsWith('`')&&seg.endsWith('`'))
      return [<code key={i} style={{fontFamily:'"JetBrains Mono",monospace',fontSize:'0.88em',background:'rgba(128,128,128,0.12)',padding:'1px 5px',borderRadius:3,color:'var(--orange)'}}>{seg.slice(1,-1)}</code>];
    return seg.split(/(\*\*\*[^*\n]+\*\*\*|\*\*[^*\n]+\*\*|__[^_\n]+__|\*[^*\n]+\*|_[^_\n]+_)/g).map((p,j)=>{
      if(/^\*\*\*/.test(p)) return <strong key={j}><em>{p.slice(3,-3)}</em></strong>;
      if(/^\*\*/.test(p)||/^__/.test(p)) return <strong key={j} style={{fontWeight:600}}>{p.slice(2,-2)}</strong>;
      if(/^\*/.test(p)||/^_/.test(p)) return <em key={j}>{p.slice(1,-1)}</em>;
      return <React.Fragment key={j}>{p.split('\n').map((l,k,a)=><React.Fragment key={k}>{l}{k<a.length-1&&<br/>}</React.Fragment>)}</React.Fragment>;
    });
  });
};

const renderMarkdown = (raw) => {
  if(!raw) return null;
  const lines = raw.split('\n');
  const out = []; let i = 0;
  while(i < lines.length){
    const line = lines[i];
    // fenced code block
    if(/^```/.test(line)){
      const lang = line.slice(3).trim().toLowerCase();
      const codeLines = []; i++;
      while(i<lines.length && !/^```/.test(lines[i])){ codeLines.push(lines[i]); i++; }
      out.push(<CodeBlock key={`cb${i}`} lang={lang} code={codeLines.join('\n')}/>);
      i++; continue;
    }
    // heading
    const hm = line.match(/^(#{1,3})\s+(.+)/);
    if(hm){
      const lvl=hm[1].length; const sz=[0,17,14,13][lvl]; const mt=[0,14,10,8][lvl];
      out.push(<div key={i} style={{fontSize:sz,fontWeight:700,color:'var(--text)',marginTop:mt,marginBottom:3}}>{renderInline(hm[2])}</div>);
      i++; continue;
    }
    // table
    if(/^\|/.test(line)){
      const rows=[]; while(i<lines.length&&/^\|/.test(lines[i])){ rows.push(lines[i]); i++; }
      const isDiv = l => /^\|[\s\-:|]+\|$/.test(l.replace(/\s/g,''));
      const data = rows.filter(l=>!isDiv(l));
      const parseRow = l => l.split('|').filter((_,x,a)=>x>0&&x<a.length-1).map(c=>c.trim());
      if(data.length){
        const [hdr,...body] = data;
        out.push(<div key={`tbl${i}`} style={{overflowX:'auto',margin:'8px 0'}}><table style={{borderCollapse:'collapse',fontSize:12.5,width:'100%'}}>
          <thead><tr>{parseRow(hdr).map((c,j)=><th key={j} style={{padding:'6px 12px',textAlign:'left',borderBottom:'2px solid var(--border)',fontWeight:600,color:'var(--text)',whiteSpace:'nowrap'}}>{renderInline(c)}</th>)}</tr></thead>
          <tbody>{body.map((row,ri)=><tr key={ri}>{parseRow(row).map((c,j)=><td key={j} style={{padding:'5px 12px',borderBottom:'1px solid var(--border-light)',color:'var(--text-2)'}}>{renderInline(c)}</td>)}</tr>)}</tbody>
        </table></div>);
      }
      continue;
    }
    // blockquote
    if(/^>\s?/.test(line)){
      const qls=[]; while(i<lines.length&&/^>\s?/.test(lines[i])){ qls.push(lines[i].replace(/^>\s?/,'')); i++; }
      out.push(<div key={`bq${i}`} style={{borderLeft:'3px solid var(--accent)',paddingLeft:12,margin:'6px 0',color:'var(--text-2)'}}>{qls.map((l,j)=><div key={j} style={{fontSize:13,lineHeight:1.5}}>{renderInline(l)}</div>)}</div>);
      continue;
    }
    // hr
    if(/^[-*_]{3,}$/.test(line.trim())){
      out.push(<hr key={i} style={{border:'none',borderTop:'1px solid var(--border)',margin:'10px 0'}}/>);
      i++; continue;
    }
    // unordered list
    if(/^[\-*+] /.test(line)){
      const items=[]; while(i<lines.length&&/^[\-*+] /.test(lines[i])){ items.push(lines[i].replace(/^[\-*+] /,'')); i++; }
      out.push(<ul key={`ul${i}`} style={{margin:'4px 0',paddingLeft:20,display:'flex',flexDirection:'column',gap:2}}>{items.map((it,j)=><li key={j} style={{fontSize:13.5,lineHeight:1.55,color:'var(--text)'}}>{renderInline(it)}</li>)}</ul>);
      continue;
    }
    // ordered list
    if(/^\d+\. /.test(line)){
      const items=[]; while(i<lines.length&&/^\d+\. /.test(lines[i])){ items.push(lines[i].replace(/^\d+\. /,'')); i++; }
      out.push(<ol key={`ol${i}`} style={{margin:'4px 0',paddingLeft:20,display:'flex',flexDirection:'column',gap:2}}>{items.map((it,j)=><li key={j} style={{fontSize:13.5,lineHeight:1.55,color:'var(--text)'}}>{renderInline(it)}</li>)}</ol>);
      continue;
    }
    // blank
    if(!line.trim()){ if(out.length) out.push(<div key={`sp${i}`} style={{height:5}}/>); i++; continue; }
    // paragraph
    out.push(<div key={i} style={{fontSize:13.5,lineHeight:1.65,color:'var(--text)'}}>{renderInline(line)}</div>);
    i++;
  }
  return out.length ? out : null;
};

const SplitPane = ({activeFile}) => {
  const [tab,setTab] = useState('code');
  const [termLines,setTermLines] = useState([{type:'cmd',text:'$ node build.js'},{type:'out',text:'  → compiling…'},{type:'out',text:'  ✓ build complete in 312ms'},{type:'cmd',text:'$ npx serve dist'},{type:'out',text:'  Serving on http://localhost:3000'}]);
  const [termInput,setTermInput] = useState('');
  const runCmd = async () => {
    const cmd = termInput.trim();
    if(!cmd) return;
    setTermLines(l=>[...l,{type:'cmd',text:'$ '+cmd}]);
    setTermInput('');
    if(window.electronAPI) {
      const r = await window.electronAPI.execCommand(cmd);
      const out = (r.stdout||'')+(r.stderr?'\n'+r.stderr:'');
      setTermLines(l=>[...l,{type:r.exitCode===0?'out':'err',text:out||'(no output)'}]);
      window.dispatchEvent(new CustomEvent('meg:action', {
        detail: { 
          action: 'addEvent', 
          value: { type: 'agent', icon: 'terminal', color: r.exitCode===0?'var(--green)':'var(--red)', title: `Ran: ${cmd}`, detail: r.exitCode===0?'Command finished':'Command failed', ws: 'Local' }
        }
      }));
    } else {
      setTermLines(l=>[...l,{type:'out',text:'(terminal only available in Electron)'}]);
    }
  };

  const defaultCode=`<!DOCTYPE html>\n<html lang="en">\n<head>\n  <title>Orbit</title>\n  <script src="cdn.tailwindcss.com"><\/script>\n</head>\n<body class="bg-slate-950 text-white">\n  <nav class="flex justify-between px-10 py-5">\n    <span class="font-bold text-xl">Orbit</span>\n  </nav>\n  <section class="min-h-screen flex flex-col\n    items-center justify-center text-center">\n    <h1 class="text-6xl font-bold mb-6">\n      Manage projects,<br/>not chaos.\n    </h1>\n    <a href="#" class="bg-orange-500 px-8 py-4\n      rounded-xl font-semibold">\n      Get started free\n    </a>\n  </section>\n</body>\n</html>`;

  const [isEditing, setIsEditing] = useState(false);
  const [editedCode, setEditedCode] = useState('');

  useEffect(() => {
    setEditedCode(activeFile?.content || defaultCode);
    setIsEditing(false);
  }, [activeFile]);

  const save = async () => {
    if (!activeFile) return;
    const r = await window.electronAPI?.writeFile(activeFile.path, editedCode);
    if (r?.ok) {
      setIsEditing(false);
      window.dispatchEvent(new CustomEvent('meg:action', {
        detail: { action: 'openFile', value: { ...activeFile, content: editedCode } }
      }));
      window.dispatchEvent(new CustomEvent('meg:action', {
        detail: { action: 'addEvent', value: { type: 'file', icon: 'save', color: 'var(--green)', title: `Saved: ${activeFile.name}`, detail: 'Manual edit saved to disk', ws: 'Local' } }
      }));
    }

  const displayCode = activeFile?.content || defaultCode;

        <div style={{display:'flex'}}>
          {[{id:'code',icon:'code',label:fileName},{id:'terminal',icon:'terminal',label:'Terminal'}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'8px 14px',display:'flex',alignItems:'center',gap:5,background:'none',border:'none',cursor:'pointer',borderBottom:`2px solid ${tab===t.id?'var(--accent)':'transparent'}`,color:tab===t.id?'#c8c8e0':'#555',fontSize:11.5,fontFamily:'inherit',transition:'color 0.15s'}}>
              <Icon name={t.icon} size={13} color={tab===t.id?'#9090c0':'#555'}/><span style={{fontFamily:'"JetBrains Mono",monospace'}}>{t.label}</span>
            </button>
          ))}
        </div>
        <div style={{padding:'0 10px',display:'flex',alignItems:'center',gap:8}}>
          {tab==='code' && activeFile && (
            isEditing ? (
              <button onClick={save} style={{padding:'2px 8px',borderRadius:4,background:'var(--green)',color:'#fff',fontSize:10.5,border:'none',cursor:'pointer',fontWeight:600}}>Save</button>
            ) : (
              <button onClick={()=>setIsEditing(true)} style={{padding:'2px 8px',borderRadius:4,background:'var(--bg-active)',color:'var(--text-2)',fontSize:10.5,border:'1px solid var(--border)',cursor:'pointer'}}>Edit</button>
            )
          )}
          <span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:10,color:'#555',background:'rgba(255,255,255,0.05)',padding:'2px 7px',borderRadius:3}}>{activeFile?'Local File':'localhost:3000'}</span>
        </div>
      </div>
      {tab==='code'?(
        <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',background:'var(--code-bg)'}}>
          {isEditing ? (
            <textarea value={editedCode} onChange={e=>setEditedCode(e.target.value)} style={{flex:1,width:'100%',background:'none',border:'none',outline:'none',padding:'12px 16px',color:'var(--code-text)',fontFamily:'"JetBrains Mono",monospace',fontSize:11,lineHeight:1.7,resize:'none'}}/>
          ) : (
            <div style={{flex:1,overflowY:'auto',padding:'12px 16px'}}>
              <pre style={{fontFamily:'"JetBrains Mono",monospace',fontSize:11,lineHeight:1.7,whiteSpace:'pre-wrap',wordBreak:'break-word'}}>
                {displayCode.split('\n').map((line,i)=>{
                  const isTag=/^\s*</.test(line);const hasClass=line.includes('class=');const hasStr=(line.includes('"')&&!hasClass)||line.includes("'");
                  return <span key={i} style={{color:isTag?'var(--code-blue)':hasClass?'var(--code-green)':hasStr?'var(--code-orange)':'var(--code-text)'}}>{line+'\n'}</span>;
                })}
              </pre>
            </div>
          )}
        </div>
      ):(
        <div style={{flex:1,display:'flex',flexDirection:'column'}}>
          <div style={{flex:1,overflowY:'auto',padding:'12px 14px',display:'flex',flexDirection:'column',gap:3}}>
            {termLines.map((l,i)=><div key={i} style={{fontFamily:'"JetBrains Mono",monospace',fontSize:11.5,lineHeight:1.6,color:l.type==='cmd'?'var(--code-green)':'var(--code-text)',whiteSpace:'pre'}}>{l.text}</div>)}
          </div>
          <div style={{padding:'8px 12px',borderTop:'1px solid var(--code-border)',display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
            <span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:11.5,color:'var(--code-green)',flexShrink:0}}>$</span>
            <input value={termInput} onChange={e=>setTermInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&runCmd()} placeholder="run a command…" style={{flex:1,background:'none',border:'none',outline:'none',fontFamily:'"JetBrains Mono",monospace',fontSize:11.5,color:'var(--code-text)',caretColor:'var(--code-green)'}}/>
          </div>
        </div>
      )}
    </div>
  );
};
