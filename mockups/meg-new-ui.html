
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meg - Desktop AI Assistant UI</title>
  
  <!-- CSS Variables & Apple Design Tokens -->
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f5f5f7;
      --surface-warm: #fbfbfd;
      --fg: #1d1d1f;
      --fg-2: #424245;
      --muted: #6e6e73;
      --meta: #86868b;
      --border: #d2d2d7;
      --border-soft: #e8e8ed;
      --accent: #0071e3;
      --accent-on: #ffffff;
      --accent-hover: #0077ed;
      --accent-active: #0066cc;
      --success: #16a34a;
      --warn: #eab308;
      --danger: #dc2626;
      --font-display: "SF Pro Display", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-body: "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-mono: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, Monaco, Consolas, monospace;
      --text-xs: 12px;
      --text-sm: 14px;
      --text-base: 17px;
      --text-lg: 21px;
      --text-xl: 28px;
      --text-2xl: 40px;
      --text-3xl: 56px;
      --text-4xl: 80px;
      --leading-body: 1.47;
      --leading-tight: 1.05;
      --tracking-display: -0.015em;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-12: 48px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --radius-pill: 980px;
      --elev-flat: none;
      --elev-ring: 0 0 0 1px var(--border);
      --elev-raised: 0 12px 32px rgba(0, 0, 0, 0.08);
      --focus-ring: 0 0 0 4px rgba(0, 113, 227, 0.35);
      --motion-fast: 150ms;
      --motion-base: 220ms;
      --ease-standard: cubic-bezier(0.28, 0, 0.22, 1);
    }

    [data-theme="dark"] {
      --bg: #0f0f0f;
      --surface: #1d1d1f;
      --surface-warm: #171719;
      --fg: #f0f0f0;
      --fg-2: #d2d2d7;
      --muted: #86868b;
      --meta: #6e6e73;
      --border: #424245;
      --border-soft: #272729;
      --accent: #2997ff;
      --accent-hover: #3ca1ff;
      --accent-active: #0071e3;
      --elev-raised: 0 12px 32px rgba(0, 0, 0, 0.35);
      --focus-ring: 0 0 0 4px rgba(41, 151, 255, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      line-height: var(--leading-body);
      -webkit-font-smoothing: antialiased;
      transition: background-color var(--motion-base) var(--ease-standard), color var(--motion-base) var(--ease-standard);
      overflow-x: hidden;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-display);
      letter-spacing: var(--tracking-display);
      font-weight: 600;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--meta);
    }

    /* Custom classes matching the Apple specs */
    .btn-capsule-primary {
      background-color: var(--accent);
      color: var(--accent-on);
      border-radius: var(--radius-pill);
      padding: 10px 24px;
      font-size: 15px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background-color var(--motion-fast) var(--ease-standard), transform var(--motion-fast) var(--ease-standard);
    }
    .btn-capsule-primary:hover {
      background-color: var(--accent-hover);
    }
    .btn-capsule-primary:active {
      background-color: var(--accent-active);
      transform: scale(0.98);
    }

    .btn-capsule-secondary {
      background-color: var(--surface);
      color: var(--fg);
      border-radius: var(--radius-pill);
      padding: 10px 24px;
      font-size: 15px;
      font-weight: 500;
      border: 1px solid var(--border);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background-color var(--motion-fast) var(--ease-standard), transform var(--motion-fast) var(--ease-standard);
    }
    .btn-capsule-secondary:hover {
      background-color: var(--border);
    }
    .btn-capsule-secondary:active {
      transform: scale(0.98);
    }

    .card-editorial {
      background-color: var(--surface-warm);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: border-color var(--motion-base) var(--ease-standard), box-shadow var(--motion-base) var(--ease-standard);
    }
    .card-editorial:hover {
      border-color: var(--border);
      box-shadow: var(--elev-raised);
    }

    .glass {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-soft);
    }
    [data-theme="dark"] .glass {
      background: rgba(29, 29, 31, 0.72);
      border-bottom: 1px solid var(--border-soft);
    }

    /* Keyframe Animations */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .animate-spin {
      animation: spin 1s linear infinite;
    }
  </style>

  <!-- React UMD and Babel standalone -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <!-- Tailwind CSS v3 via CDN (Note: cdn.tailwindcss.com is v3) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // ─── Inline SVG Icon Set ───
    const Icon = ({ name, size = 16, className = "" }) => {
      const paths = {
        chat: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />,
        workspace: <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />,
        timeline: <path d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" />,
        automation: <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
        agent: <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" />,
        files: <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6" />,
        settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />,
        plus: <path d="M12 5v14M5 12h14" />,
        search: <><circle cx="11" cy="11" r="8" /><path d="M21 21l-4.3-4.3" /></>,
        trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />,
        check: <path d="M20 6L9 17l-5-5" />,
        close: <path d="M18 6L6 18M6 6l12 12" />,
        terminal: <path d="M4 17l6-6-6-6M12 19h8" />,
        git: <><circle cx="18" cy="18" r="3" /><circle cx="6" cy="6" r="3" /><circle cx="6" cy="18" r="3" /><path d="M18 15V9a4 4 0 0 0-4-4H9M6 9v6" /></>,
        chevronDown: <path d="M6 9l6 6 6-6" />,
        splitH: <path d="M12 2v20M2 12h20" />,
        spinner: <path d="M21 12a9 9 0 0 1-9 9m9-9a9 9 0 0 0-9-9" />,
        bolt: <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
        lock: <><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></>,
        memory: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
        sms: <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />,
        info: <><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></>,
        chevronRight: <path d="M9 18l6-6-6-6" />,
        laptop: <><rect x="2" y="3" width="20" height="14" rx="2" /><line x1="2" y1="20" x2="22" y2="20" /><line x1="12" y1="17" x2="12" y2="20" /></>
      };

      return (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={`inline-block ${className}`}
        >
          {paths[name] || <circle cx="12" cy="12" r="10" />}
        </svg>
      );
    };

    // ─── Main Application Component ───
    const App = () => {
      // Global UI State
      const [inApp, setInApp] = useState(false);
      const [nav, setNav] = useState('chat');
      const [theme, setTheme] = useState('dark'); // Default to Apple cinematic dark
      const [sidebarWidth, setSidebarWidth] = useState('comfortable'); // comfortable, compact
      const [accentColor, setAccentColor] = useState('blue'); // blue, graphite
      const [showCmdPalette, setShowCmdPalette] = useState(false);
      const [showTelegram, setShowTelegram] = useState(false);

      // Onboarding state
      const [onboardingStep, setOnboardingStep] = useState(0);

      // Chat Data & Thread State
      const [activeThreadId, setActiveThreadId] = useState(1);
      const [threads, setThreads] = useState([
        { id: 1, title: 'Add Vitest to Agent Runner', subtitle: 'qwen3.5-9b · 5m ago', iconName: 'chat', messages: [
          { role: 'user', content: 'Configure Vitest test coverage for the local agentRunner.js component.' },
          { role: 'agent', isThinking: false, thinkingProcess: 'Searching repository for test suites...', status: 'done', content: 'I have analyzed `test/agentRunner.test.js` and successfully loaded the Vitest mock environments. All 15 tests are passing. Would you like me to configure a file watcher for active testing?' }
        ] },
        { id: 2, title: 'Debug Path Traversal Filter', subtitle: 'gpt-4o · 1h ago', iconName: 'lock', messages: [
          { role: 'user', content: 'Are write operations sandboxed properly against relative paths?' },
          { role: 'agent', isThinking: false, content: 'Yes, path traversal is intercepted in `workspace.js` using path.relative checks. Any write attempt containing `..` will throw a security boundary exception.' }
        ] },
        { id: 3, title: 'Write Release Notes Beta 9', subtitle: 'claude-3-5-sonnet · 1d ago', iconName: 'files', messages: [
          { role: 'user', content: 'Generate release highlights for Meg version 1.0.0-beta.9.' },
          { role: 'agent', isThinking: false, content: 'Highlights for beta-9:\n- Migrated prompt dialogs to React modals\n- Standardized file approval diff checks\n- Bound maximum thread retention logs to 500 lines' }
        ] }
      ]);

      // Chat Inputs
      const [chatInput, setChatInput] = useState('');
      const [activeSkill, setActiveSkill] = useState('DevOps');
      const [thinkingMode, setThinkingMode] = useState(true);

      // Workspace State
      const [workspaces, setWorkspaces] = useState([
        { id: 1, name: 'Meg Desktop Client', path: 'C:/Users/natna/Downloads/MEG/Meg', branch: 'main', dirty: true, ahead: 2, color: '#0071e3', files: 42, lang: 'React/Node' },
        { id: 2, name: 'Agent Runner Core', path: 'C:/Users/natna/Downloads/MEG/Core', branch: 'develop', dirty: false, ahead: 0, color: '#16a34a', files: 18, lang: 'JavaScript' }
      ]);
      const [activeWorkspaceId, setActiveWorkspaceId] = useState(1);
      const [fileQuery, setFileQuery] = useState('');
      const [splitOpen, setSplitOpen] = useState(true);

      // Staged Writes / Diff Approvals Queue
      const [approvals, setApprovals] = useState([
        { id: 1, file: 'src/main/tools.js', desc: 'Secure cmd execution filter', added: 4, removed: 1, before: 'function run(cmd) {\n  return exec(cmd);\n}', after: 'function run(cmd) {\n  if (isDangerous(cmd)) throw new Error("Denied");\n  return exec(cmd);\n}' }
      ]);

      // Automations State
      const [automations, setAutomations] = useState([
        { id: 1, name: 'PR Review', triggerType: 'pull_request', triggerDetail: 'on PR opened', actionType: 'agent_run', actionTarget: 'pr-reviewer', enabled: true, runs: 12, lastRun: '10m ago' },
        { id: 2, name: 'Weekly Progress Draft', triggerType: 'schedule', triggerDetail: 'Every Friday 5pm', actionType: 'document', actionTarget: 'reports/weekly.md', enabled: false, runs: 0, lastRun: 'Never' }
      ]);

      // Agent runs State
      const [agentRuns, setAgentRuns] = useState([
        { id: 1, task: 'Secure cmd filter checks', status: 'running', doneSteps: 2, steps: 4, model: 'qwen3.5-9b', duration: '12s', thread: 'Add Vitest to Agent Runner', logs: [
          { level: 'INFO', message: 'Loading file workspace system configs' },
          { level: 'INFO', message: 'Testing command lines for dangerous patterns' }
        ], liveSteps: [
          { label: 'Initializing tool suite mocks', status: 'done' },
          { label: 'Scanning C:/Users/natna/Downloads/MEG/Meg for security boundaries', status: 'active' },
          { label: 'Writing secure execution filters', status: 'waiting' },
          { label: 'Verifying test paths', status: 'waiting' }
        ] }
      ]);

      // Timeline events
      const [timelineEvents, setTimelineEvents] = useState([
        { id: 1, category: 'agent', title: 'Agent secure cmd filter checks started', detail: 'Thread: Add Vitest to Agent Runner', date: 'Just now' },
        { id: 2, category: 'commit', title: 'Committed: Security boundary rules added', detail: 'Author: Natna · SHA: 5b2210a', date: '2h ago' },
        { id: 3, category: 'sms', title: 'Telegram keyword run-pr triggered', detail: 'Fired agent run for pull requests', date: '1d ago' }
      ]);

      // Settings state
      const [settingsSection, setSettingsSection] = useState('model');
      const [memories, setMemories] = useState([
        'Wants local-first models preferred',
        'Telegram connection authorized for PR runs',
        'Auto-approval disabled for shell commands'
      ]);

      // Command Palette state
      const [cmdQuery, setCmdQuery] = useState('');

      // Telegram Companion Chat
      const [telegramInput, setTelegramInput] = useState('');
      const [telegramMessages, setTelegramMessages] = useState([
        { id: 1, sender: 'bot', text: 'Meg Remote Bot Online. Send /status to query or /run [action] to execute.' }
      ]);

      // Apply theme choice to document
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
      }, [theme]);

      const activeThread = useMemo(() => {
        return threads.find(t => t.id === activeThreadId);
      }, [threads, activeThreadId]);

      const activeWorkspace = useMemo(() => {
        return workspaces.find(w => w.id === activeWorkspaceId);
      }, [workspaces, activeWorkspaceId]);

      // Simulated Thread Message Actions
      const handleSendMessage = (text) => {
        if (!text.trim()) return;
        
        // Add user message
        const newMsg = { role: 'user', content: text };
        const updatedThreads = threads.map(t => {
          if (t.id === activeThreadId) {
            return {
              ...t,
              subtitle: 'Just now',
              messages: [...t.messages, newMsg]
            };
          }
          return t;
        });
        setThreads(updatedThreads);
        setChatInput('');

        // Simulate Agent Thinking & Tool logs
        const runId = Date.now();
        const agentRun = {
          id: runId,
          task: text.slice(0, 30) + '...',
          status: 'running',
          doneSteps: 1,
          steps: 3,
          model: 'qwen3.5-9b',
          duration: '1s',
          thread: activeThread.title,
          logs: [
            { level: 'INFO', message: 'Analyzing prompt' }
          ],
          liveSteps: [
            { label: 'Decomposing task specifications', status: 'done' },
            { label: 'Executing read_files on workspace', status: 'active' },
            { label: 'Summarizing outcome', status: 'waiting' }
          ]
        };
        setAgentRuns(prev => [agentRun, ...prev]);

        // Streaming agent response
        setTimeout(() => {
          setAgentRuns(prev => prev.map(r => {
            if (r.id === runId) {
              return {
                ...r,
                doneSteps: 2,
                logs: [...r.logs, { level: 'INFO', message: 'Executing tool read_files' }],
                liveSteps: [
                  { label: 'Decomposing task specifications', status: 'done' },
                  { label: 'Executing read_files on workspace', status: 'done' },
                  { label: 'Summarizing outcome', status: 'active' }
                ]
              };
            }
            return r;
          }));
        }, 1200);

        setTimeout(() => {
          const agentMsg = {
            role: 'agent',
            isThinking: false,
            content: 'I have reviewed the files inside the workspace. All security boundary rules are properly bound to :root, and there are no path traversals found.'
          };

          setThreads(currentThreads => currentThreads.map(t => {
            if (t.id === activeThreadId) {
              return {
                ...t,
                messages: [...t.messages, agentMsg]
              };
            }
            return t;
          }));

          setAgentRuns(prev => prev.map(r => {
            if (r.id === runId) {
              return {
                ...r,
                status: 'done',
                doneSteps: 3,
                duration: '2.5s',
                logs: [...r.logs, { level: 'INFO', message: 'Task complete' }],
                liveSteps: [
                  { label: 'Decomposing task specifications', status: 'done' },
                  { label: 'Executing read_files on workspace', status: 'done' },
                  { label: 'Summarizing outcome', status: 'done' }
                ]
              };
            }
            return r;
          }));
        }, 2500);
      };

      // Trigger Workflow run from workspace view
      const runWorkspaceWorkflow = (workflowName) => {
        const text = `Run action: ${workflowName}`;
        setNav('chat');
        handleSendMessage(text);
      };

      // Manage Approvals Diff
      const handleApproveDiff = (id) => {
        setApprovals(prev => prev.filter(a => a.id !== id));
        // Add event to timeline
        const event = {
          id: Date.now(),
          category: 'file',
          title: 'Modified tools.js approved & written',
          detail: 'Diff committed successfully to local disk',
          date: 'Just now'
        };
        setTimelineEvents(prev => [event, ...prev]);
      };

      // Manage Telegram Remote control simulator
      const handleTelegramSend = () => {
        if (!telegramInput.trim()) return;
        const userMsg = { id: Date.now(), sender: 'user', text: telegramInput };
        setTelegramMessages(prev => [...prev, userMsg]);
        setTelegramInput('');

        // Simulate remote replies
        setTimeout(() => {
          let replyText = 'Unknown command. Send /status or /run [action] to execute.';
          if (userMsg.text.startsWith('/status')) {
            replyText = `Status Report: Active Workspace: "${activeWorkspace.name}". Client running on branch ${activeWorkspace.branch}. Staged approvals: ${approvals.length}.`;
          } else if (userMsg.text.startsWith('/run pr-review')) {
            replyText = 'Spawning agent "PR Reviewer" remotely...';
            // Trigger agent run
            runWorkspaceWorkflow('PR Review');
          }
          setTelegramMessages(prev => [...prev, { id: Date.now(), sender: 'bot', text: replyText }]);
        }, 800);
      };

      // Command Palette actions
      const handleCmdSelect = (action) => {
        setShowCmdPalette(false);
        if (action === 'chat') setNav('chat');
        if (action === 'workspace') setNav('workspace');
        if (action === 'automations') setNav('automations');
        if (action === 'settings') setNav('settings');
        if (action === 'timeline') setNav('timeline');
      };

      return (
        <div className="min-h-screen flex flex-col transition-colors duration-300">
          
          {/* ────────────────── LANDING / MARKETING VIEW ────────────────── */}
          {!inApp && (
            <div className="flex-1 flex flex-col justify-between" style={{ backgroundColor: 'var(--bg)' }}>
              {/* Header */}
              <header className="glass sticky top-0 z-50 h-[64px] flex items-center px-8 justify-between">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ backgroundColor: 'var(--accent)' }}>
                    <span className="text-white font-bold text-sm font-display">M</span>
                  </div>
                  <span className="text-lg font-bold tracking-tight">Meg</span>
                </div>
                <div className="flex items-center gap-6">
                  <button 
                    onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} 
                    aria-label="Toggle Dark Mode"
                    className="p-2 rounded-lg text-[var(--muted)] hover:text-[var(--fg)]"
                  >
                    <Icon name="bolt" size={18} />
                  </button>
                  <button 
                    onClick={() => setInApp(true)} 
                    className="btn-capsule-primary"
                  >
                    Launch client preview <Icon name="chevronRight" size={12} />
                  </button>
                </div>
              </header>

              {/* Main Marketing */}
              <main className="flex-1 max-w-6xl mx-auto px-6 py-16 flex flex-col justify-center items-center text-center">
                <div className="max-w-3xl">

                        { label: 'Navigate to Settings', action: 'settings', desc: 'LLM providers & permissions' }
                      ]
                      .filter(i => i.label.toLowerCase().includes(cmdQuery.toLowerCase()))
                      .map((item, idx) => (
                        <button
                          key={idx}
                          onClick={() => handleCmdSelect(item.action)}
                          className="w-full text-left p-3 hover:bg-[var(--border-soft)] transition-colors rounded-lg flex justify-between items-center text-xs"
                        >
                          <div>
                            <div className="font-semibold text-[var(--fg)]">{item.label}</div>
                            <div className="text-[10px] text-[var(--meta)] mt-0.5">{item.desc}</div>
                          </div>
                          <span className="text-[10px] bg-[var(--surface)] px-2 py-0.5 rounded font-mono">Select</span>
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* ─── Collapsible Floating Tweaks Panel (Apple style) ─── */}
              <div className="fixed bottom-4 right-4 z-50 bg-[var(--surface-warm)] border border-[var(--border)] rounded-2xl shadow-xl p-4 w-[280px]">
                <div className="flex justify-between items-center mb-3">
                  <span className="text-xs font-bold uppercase tracking-wider text-[var(--muted)] font-mono flex items-center gap-1.5">
                    <Icon name="bolt" size={13} />
                    Design Configurator
                  </span>
                </div>
                
                <div className="space-y-3 text-xs">
                  {/* Theme toggle */}
                  <div className="flex justify-between items-center">
                    <span>Color theme</span>
                    <select 
                      value={theme} 
                      onChange={(e) => setTheme(e.target.value)}
                      className="bg-[var(--bg)] border border-[var(--border)] rounded p-1 outline-none text-[var(--fg)]"
                    >
                      <option value="light">Apple Light</option>
                      <option value="dark">Apple Dark</option>
                    </select>
                  </div>

                  {/* Sidebar Width */}
                  <div className="flex justify-between items-center">
                    <span>Sidebar width</span>
                    <select 
                      value={sidebarWidth} 
                      onChange={(e) => setSidebarWidth(e.target.value)}
                      className="bg-[var(--bg)] border border-[var(--border)] rounded p-1 outline-none text-[var(--fg)]"
                    >
                      <option value="comfortable">Comfortable</option>
                      <option value="compact">Compact</option>
                    </select>
                  </div>

                  {/* Accent Color */}
                  <div className="flex justify-between items-center">
                    <span>Accent color</span>
                    <div className="flex gap-2">
                      <button 
                        onClick={() => {
                          setAccentColor('blue');
                          document.documentElement.style.setProperty('--accent', theme === 'dark' ? '#2997ff' : '#0071e3');
                        }}
                        className={`w-4 h-4 rounded-full bg-blue-600 ${accentColor === 'blue' ? 'ring-2 ring-white' : ''}`}
                        title="Blue Accent"
                      ></button>
                      <button 
                        onClick={() => {
                          setAccentColor('graphite');
                          document.documentElement.style.setProperty('--accent', '#6e6e73');
                        }}
                        className={`w-4 h-4 rounded-full bg-zinc-600 ${accentColor === 'graphite' ? 'ring-2 ring-white' : ''}`}
                        title="Graphite Accent"
                      ></button>
                    </div>
                  </div>

                  <button 
                    onClick={() => setInApp(false)}
                    className="w-full mt-2 py-1.5 bg-red-600/10 text-red-500 rounded text-center font-semibold hover:bg-red-600/20 transition-colors border border-red-500/20"
                  >
                    Return to marketing page
                  </button>
                </div>
              </div>

            </div>
          )}

        </div>
      );
    };

    // Render application
    const rootElement = document.getElementById('root');
    if (rootElement) {
      ReactDOM.createRoot(rootElement).render(<App />);
    }
  </script>
</body>
</html>
